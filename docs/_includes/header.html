<header class="site-header">
  <div class="container site-header__inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img class="brand__mark" src="{{ '/assets/img/logo.png' | relative_url }}" alt="" width="34" height="34">
      <span class="brand__name">Raxicore Editor</span>
    </a>
    <nav class="nav">
      <a class="nav__link{% if page.url == '/' %} is-active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
      <a class="nav__link{% if page.url contains '/formats' %} is-active{% endif %}" href="{{ '/formats/' | relative_url }}">Formats</a>
      <a class="nav__link{% if page.url contains '/building' %} is-active{% endif %}" href="{{ '/building/' | relative_url }}">Building</a>
      <a class="nav__link nav__link--icon" href="https://github.com/{{ site.repository }}" target="_blank" rel="noopener">
        GitHub ↗
      </a>
    </nav>
  </div>
</header>
